<!DOCTYPE html>
<html>
<head>
  <title>Render iPhone Frames</title>
  <style>
    body { background: #000; color: #fff; font-family: monospace; padding: 20px; }
    #status { font-size: 18px; margin-bottom: 20px; }
    canvas { display: block; margin: 10px 0; border: 1px solid #333; }
  </style>
  <script type="importmap">
  { "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }}
  </script>
</head>
<body>
  <div id="status">Loading model...</div>
  <div id="output"></div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const TOTAL_FRAMES = 48;
    const W = 400;
    const H = 700;
    const status = document.getElementById('status');

    // Setup offscreen renderer
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(30, W / H, 0.001, 10);
    camera.position.set(0, 0, 0.42);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
    renderer.setSize(W, H);
    renderer.setPixelRatio(1);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 2.2;
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    // Lights
    scene.add(new THREE.AmbientLight(0xffffff, 1.5));
    const key = new THREE.DirectionalLight(0xffffff, 3);
    key.position.set(3, 4, 5);
    scene.add(key);
    const fill = new THREE.DirectionalLight(0x4488ff, 1.2);
    fill.position.set(-3, 2, 2);
    scene.add(fill);
    const rim = new THREE.DirectionalLight(0x8855ff, 0.8);
    rim.position.set(-1, -2, -3);
    scene.add(rim);
    const top = new THREE.DirectionalLight(0xffffff, 1.0);
    top.position.set(0, 5, 0);
    scene.add(top);
    const back = new THREE.DirectionalLight(0x2159E2, 0.6);
    back.position.set(0, 0, -3);
    scene.add(back);

    // Load model
    const loader = new GLTFLoader();
    loader.load('/iphone-17-pro.glb', async (gltf) => {
      const model = gltf.scene;
      const box = new THREE.Box3().setFromObject(model);
      model.position.sub(box.getCenter(new THREE.Vector3()));
      model.rotation.x = 0.12;
      scene.add(model);

      status.textContent = 'Rendering frames...';
      const frames = [];

      for (let i = 0; i < TOTAL_FRAMES; i++) {
        model.rotation.y = (i / TOTAL_FRAMES) * Math.PI * 2;
        renderer.render(scene, camera);

        // Get frame as blob
        const blob = await new Promise(r => renderer.domElement.toBlob(r, 'image/webp', 0.85));
        frames.push(blob);
        status.textContent = `Rendered ${i + 1}/${TOTAL_FRAMES}`;
      }

      // Create download links
      status.textContent = 'Done! Downloading frames...';
      const output = document.getElementById('output');

      for (let i = 0; i < frames.length; i++) {
        const url = URL.createObjectURL(frames[i]);
        const a = document.createElement('a');
        a.href = url;
        a.download = `iphone-frame-${String(i).padStart(2, '0')}.webp`;
        a.click();

        // Also show preview
        const img = document.createElement('img');
        img.src = url;
        img.style.width = '100px';
        img.style.display = 'inline-block';
        output.appendChild(img);

        // Small delay to not overwhelm browser
        await new Promise(r => setTimeout(r, 100));
      }

      status.textContent = `✅ All ${TOTAL_FRAMES} frames downloaded!`;
      window.__framesReady = frames.length;
    });
  </script>
</body>
</html>
