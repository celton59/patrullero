<!DOCTYPE html>
<html>
<head>
  <title>Render iPhone Frames v2 — campus inside screen</title>
  <style>body{background:#000;color:#fff;font-family:monospace;padding:20px}#status{font-size:18px;margin-bottom:10px}</style>
  <script type="importmap">
  {"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"}}
  </script>
</head>
<body>
  <div id="status">Loading...</div>
  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const FRAMES = 48, W = 400, H = 700;
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(30, W/H, 0.001, 10);
    camera.position.set(0, 0, 0.42);
    const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true, preserveDrawingBuffer:true});
    renderer.setSize(W,H); renderer.setPixelRatio(1);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 2.2;
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    // Lights
    scene.add(new THREE.AmbientLight(0xffffff, 1.5));
    const k=new THREE.DirectionalLight(0xffffff,3); k.position.set(3,4,5); scene.add(k);
    const f=new THREE.DirectionalLight(0x4488ff,1.2); f.position.set(-3,2,2); scene.add(f);
    const r=new THREE.DirectionalLight(0x8855ff,0.8); r.position.set(-1,-2,-3); scene.add(r);
    const t=new THREE.DirectionalLight(0xffffff,1); t.position.set(0,5,0); scene.add(t);

    // Load campus screenshot
    const texLoader = new THREE.TextureLoader();
    const campusTex = await new Promise(resolve => texLoader.load('/campus-screenshot.jpg', resolve));
    campusTex.colorSpace = THREE.SRGBColorSpace;

    new GLTFLoader().load('/iphone-17-pro.glb', async (gltf) => {
      const model = gltf.scene;
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      model.position.sub(center);
      model.rotation.x = 0.12;

      // Find the Screen mesh to get exact dimensions
      let screenMesh = null;
      model.traverse((child) => {
        if (child.isMesh && child.material && child.material.name === 'Display') {
          screenMesh = child;
          // Log the bounding box of the screen
          const sb = new THREE.Box3().setFromObject(child);
          console.log('Screen bounds:', JSON.stringify({
            min: {x: sb.min.x.toFixed(5), y: sb.min.y.toFixed(5), z: sb.min.z.toFixed(5)},
            max: {x: sb.max.x.toFixed(5), y: sb.max.y.toFixed(5), z: sb.max.z.toFixed(5)},
            sizeX: (sb.max.x - sb.min.x).toFixed(5),
            sizeY: (sb.max.y - sb.min.y).toFixed(5),
          }));
        }
      });

      scene.add(model);

      // Wait for console to flush, then use measured screen bounds
      // From GLB analysis: Screen mesh "Cube.004" Display material
      // Bounds approx: x: -0.0338 to 0.0338, y: -0.0728 to 0.0728, z: ~0.00345
      // Use slightly smaller to stay inside bezels with rounded corners

      // Screen plane — slightly smaller than actual screen to avoid bleeding over bezels
      const screenW = 0.062;  // ~92% of screen width
      const screenH = 0.134;  // ~92% of screen height
      const screenGeo = new THREE.PlaneGeometry(screenW, screenH);

      // Round corners with a custom shape
      const shape = new THREE.Shape();
      const hw = screenW / 2, hh = screenH / 2, cr = 0.004; // corner radius
      shape.moveTo(-hw + cr, -hh);
      shape.lineTo(hw - cr, -hh);
      shape.quadraticCurveTo(hw, -hh, hw, -hh + cr);
      shape.lineTo(hw, hh - cr);
      shape.quadraticCurveTo(hw, hh, hw - cr, hh);
      shape.lineTo(-hw + cr, hh);
      shape.quadraticCurveTo(-hw, hh, -hw, hh - cr);
      shape.lineTo(-hw, -hh + cr);
      shape.quadraticCurveTo(-hw, -hh, -hw + cr, -hh);

      const roundedGeo = new THREE.ShapeGeometry(shape);
      const screenMat = new THREE.MeshBasicMaterial({
        map: campusTex,
        toneMapped: false,
      });
      const screenPlane = new THREE.Mesh(roundedGeo, screenMat);
      // Position above the glass layer
      screenPlane.position.set(0, 0, 0.0044);
      model.add(screenPlane);

      // Dynamic Island cutout (black pill at top)
      const diShape = new THREE.Shape();
      const diW = 0.018, diH = 0.003, diR = 0.0015;
      diShape.moveTo(-diW + diR, -diH);
      diShape.lineTo(diW - diR, -diH);
      diShape.quadraticCurveTo(diW, -diH, diW, -diH + diR);
      diShape.lineTo(diW, diH - diR);
      diShape.quadraticCurveTo(diW, diH, diW - diR, diH);
      diShape.lineTo(-diW + diR, diH);
      diShape.quadraticCurveTo(-diW, diH, -diW, diH - diR);
      diShape.lineTo(-diW, -diH + diR);
      diShape.quadraticCurveTo(-diW, -diH, -diW + diR, -diH);

      const diGeo = new THREE.ShapeGeometry(diShape);
      const diMat = new THREE.MeshBasicMaterial({ color: 0x000000, toneMapped: false });
      const diPlane = new THREE.Mesh(diGeo, diMat);
      diPlane.position.set(0, 0.062, 0.00356);
      model.add(diPlane);

      document.getElementById('status').textContent = 'Rendering...';
      window.__frameDataURLs = [];
      for (let i = 0; i < FRAMES; i++) {
        model.rotation.y = (i / FRAMES) * Math.PI * 2;
        renderer.render(scene, camera);
        window.__frameDataURLs.push(renderer.domElement.toDataURL('image/webp', 0.85));
        document.getElementById('status').textContent = `Frame ${i+1}/${FRAMES}`;
      }
      document.getElementById('status').textContent = '✅ Done!';
    });
  </script>
</body>
</html>
